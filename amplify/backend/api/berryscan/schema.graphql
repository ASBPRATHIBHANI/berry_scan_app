# 1. SCAN HISTORY
type ScanHistory @model @auth(rules: [{ allow: owner }]) {
  id: ID!
  disease: String!
  confidence: Float
  imagePath: String
  timestamp: AWSDateTime
}

# 2. TREATMENTS
type Treatment @model @auth(rules: [{ allow: private, operations: [read] }]) {
  id: ID!
  diseaseName: String!
  chemicalCure: String
  organicCure: String
}
