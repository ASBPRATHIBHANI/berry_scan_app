name: berryscan_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- LOCAL DATABASE (SQLite) ---
  sqflite: ^2.3.0
  path: ^1.9.0

  # --- AWS BACKEND (Amplify 2.9.0) ---
  amplify_flutter: ^2.9.0
  amplify_auth_cognito: ^2.9.0
  amplify_api: ^2.9.0
  amplify_storage_s3: ^2.9.0

  # --- AI & CAMERA (Optimized for Cloud) ---
  camera: ^0.10.6
  # ✅ REMOVED: tflite_flutter (No longer needed since AWS handles the model)
  image: ^4.1.3
  http: ^1.6.0 # ✅ Added for Cloud API requests


  # --- UTILITIES ---
  permission_handler: ^11.0.1
  intl: ^0.20.0 
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  app_links: ^6.3.0  

  # --- UI & FONTS ---
  flutter_screenutil: ^5.9.0
  image_picker: ^1.0.7
  google_fonts: ^6.3.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Assets configuration (Cleaned for Cloud)
  assets:
    - assets/images/
    # ✅ REMOVED: assets/model/ (Reduces app size by 104MB+)
    

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21